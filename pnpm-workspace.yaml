packages:
  - "packages/*"
minimumReleaseAge: 360
allowBuilds:
  # Windows installer maker, pulled in transitively by electron-builder. We
  # only ship macOS (arm64) → never build it (it would fetch Squirrel.Windows).
  electron-winstaller: false
  esbuild: true
  msgpackr-extract: true
  msw: true
  node-datachannel: true
  sharp: true
  workerd: true
nodeLinker: hoisted
