packages:
  - "packages/*"
minimumReleaseAge: 360
allowBuilds:
  esbuild: true
  msgpackr-extract: true
  msw: true
  node-datachannel: true
  sharp: true
  workerd: true
nodeLinker: hoisted
# Include other platforms' prebuilt optional deps (e.g. @img/sharp-*) in the
# lockfile so a CI/EAS worker whose arch differs from the dev machine still
# installs a prebuilt binary instead of falling back to a source build.
supportedArchitectures:
  os:
    - current
    - darwin
    - linux
  cpu:
    - current
    - x64
    - arm64
